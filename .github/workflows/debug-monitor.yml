name: "Agent 5 : Debug Monitor"

on:
  schedule:
    - cron: "0 6 * * *"  # Chaque jour à 7h (avant les autres agents)
  workflow_dispatch:  # Lancer manuellement

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: "🔍 Agent 5 : Vérification système"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: npx tsx scripts/debug-check.ts

  # Si le check échoue, GitHub t'envoie un email automatiquement
  # Va dans Settings > Notifications pour activer les alertes
