name: "Agent 1 : Génération quotidienne (RSS → article)"

on:
  schedule:
    - cron: "0 6 * * *"  # Chaque jour à 7h (heure française)
  workflow_dispatch:

jobs:
  generate-daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: "🤖 Agent 1 : Lire RSS + générer l'article du jour"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npx tsx scripts/generate-content.ts --daily

      - name: Commit l'article en queue
        run: |
          git config user.name "Standard IA Bot"
          git config user.email "bot@standard-ia.pro"
          git add -A
          git diff --staged --quiet || git commit -m "🤖 Article $(date +%Y-%m-%d) généré depuis RSS"
          git push
