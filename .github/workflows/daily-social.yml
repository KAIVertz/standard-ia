name: "Agent 3 : Post Twitter quotidien"

on:
  schedule:
    - cron: "0 8 * * *"  # Chaque jour à 9h (heure française)
  workflow_dispatch:
    inputs:
      file:
        description: "Fichier à poster (ex: content/social/tweet.txt)"
        required: false
      thread:
        description: "Poster comme thread ?"
        type: boolean
        default: false

jobs:
  post-tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: "🐦 Agent 3 : Poster sur Twitter"
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: |
          # Trouver le contenu social de la semaine
          WEEK=$(date +%V)
          SOCIAL_FILE="content/social/social-week${WEEK}.md"

          if [ -f "$SOCIAL_FILE" ]; then
            echo "📱 Contenu trouvé : $SOCIAL_FILE"
            npx tsx scripts/post-twitter.ts "$SOCIAL_FILE" --auto
          else
            echo "⚠️ Pas de contenu social pour la semaine $WEEK"
            # Fallback: tweet promo
            echo "L'IA évolue vite. Très vite.

Chaque semaine, on décrypte le meilleur de l'IA — en français, sans jargon.

Rejoins la newsletter gratuite 👇
standard-ia.pro" > /tmp/promo-tweet.txt
            npx tsx scripts/post-twitter.ts /tmp/promo-tweet.txt
          fi
