name: "Agent 1+2 : Génération + Déploiement hebdomadaire"

on:
  schedule:
    - cron: "0 7 * * 1"  # Chaque lundi à 8h (heure française, UTC+1)
  workflow_dispatch:  # Permet de lancer manuellement

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: "🤖 Agent 1 : Générer le contenu"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npx tsx scripts/generate-content.ts

      - name: Commit new content
        run: |
          git config user.name "Standard IA Bot"
          git config user.email "bot@standard-ia.pro"
          git add -A
          git diff --staged --quiet || git commit -m "🤖 Contenu semaine auto-généré"
          git push

      - name: "🚀 Agent 2 : Déployer"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel --prod --yes --token=$VERCEL_TOKEN
