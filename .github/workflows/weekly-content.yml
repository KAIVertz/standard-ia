name: "Agent 1 : Génération hebdomadaire de contenu"

on:
  schedule:
    - cron: "0 6 * * 1"  # Chaque lundi à 7h UTC (8h française)
  workflow_dispatch:

jobs:
  generate-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: "🤖 Agent 1 : Générer 7 articles + contenu social"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npx tsx scripts/generate-content.ts

      - name: Commit le contenu généré
        run: |
          git config user.name "Standard IA Bot"
          git config user.email "bot@standard-ia.pro"
          git add -A
          git diff --staged --quiet || git commit -m "🤖 Contenu semaine $(date +%V) généré automatiquement"
          git push
