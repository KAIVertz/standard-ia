name: "ÉCHO + DÉVA + FLASH : Publication quotidienne"

on:
  schedule:
    - cron: "0 8 * * *"  # Chaque jour à 9h heure française
  workflow_dispatch:

jobs:
  publish-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: "📰 ÉCHO — Publier l'article du jour"
        run: npx tsx scripts/publish-today.ts

      - name: Commit & push l'article
        run: |
          git config user.name "Standard IA Bot"
          git config user.email "bot@standard-ia.pro"
          git add -A
          git diff --staged --quiet || git commit -m "📰 Article du jour publié ($(date +%Y-%m-%d))"
          git push

      - name: "🚀 DÉVA — Build + déploiement Vercel"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          npx vercel build --prod --token=$VERCEL_TOKEN
          npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

      - name: "⚡ FLASH — Tweeter l'article"
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: |
          if [ -f "content/social/tweet-today.txt" ]; then
            npx tsx scripts/post-twitter.ts content/social/tweet-today.txt
          else
            WEEK=$(date +%V)
            SOCIAL_FILE="content/social/social-week${WEEK}.md"
            [ -f "$SOCIAL_FILE" ] && npx tsx scripts/post-twitter.ts "$SOCIAL_FILE" --auto
          fi
